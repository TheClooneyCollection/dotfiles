# Automatically rename windows
set-option -g allow-rename on

# Use current pane's directory basename as the window name
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Ctrl + Left = previous window
bind-key -n C-Left previous-window

# Ctrl + Right = next window
bind-key -n C-Right next-window

# Split panes
bind 'v' split-window -v -c "#{pane_current_path}"
bind 'h' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
bind '\' split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# K for Kill
bind-key K confirm-before -p "Kill session #S? (y/n)" kill-session

# https://hamvocke.com/blog/a-guide-to-customizing-your-tmux-conf/

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell on
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action any
# Use this instead if you only want visual bells for background windows.
# set -g bell-action other
set -g monitor-bell on

# switch panes using Alt-arrow without prefix
# bind -n S-Left select-pane -L
# bind -n S-Right select-pane -R
# bind -n M-Up select-pane -U
# bind -n M-Down select-pane -D

# reload config file
# (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# Create a 70/20/10 vertical stack from a single-pane window.
bind C-l run-shell 'if [ "$(tmux display-message -p "#{window_panes}")" = "1" ]; then path="$(tmux display-message -p "#{pane_current_path}")"; tmux split-window -v -p 30 -c "$path"; tmux split-window -v -p 33 -c "$path"; tmux select-pane -t 0; tmux set-option -w @stack702010 1; else tmux display-message "70/20/10 layout requires a single-pane window"; fi'

# Only swap panes in windows created with the 70/20/10 layout binding.
# Preserve zoom if already zoomed; otherwise swap, focus pane 0, and zoom.
bind C-b if -F '#{&&:#{==:#{@stack702010},1},#{==:#{window_panes},3}}' { if -F '#{window_zoomed_flag}' { swap-pane -Z -s 0 -t 1 ; select-pane -Z -t 0 } { swap-pane -s 0 -t 1 ; select-pane -t 0 ; resize-pane -Z } } { display-message "Current window is not the 70/20/10 layout" }

# Enable mouse control (clickable windows, panes, resizable panes)
set -g mouse on

# Use tmux's terminfo entry and advertise RGB support for common parent terminals.
set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm-256color:RGB,tmux-256color:RGB"
# Let terminal-aware apps inside tmux emit notifications to the outer terminal.
set -g allow-passthrough on

# clock mode
setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'fg=black bg=green bold'

# panes
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour245"

# statusbar
set -g status-position bottom
set -g status-justify centre
set -g status-style 'bg=default,fg=colour245'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=gray,dim'
set -g status-right '| %Y-%m-%d %H:%M |'
set -g status-right-length 48

setw -g window-status-current-style 'fg=white,bold'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=colour245,dim'
setw -g window-status-format ' #I #W #F '
setw -g window-status-bell-style default

# messages
set -g message-style 'fg=yellow bg=green bold'
